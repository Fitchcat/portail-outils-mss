<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail My Sport Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        .admin-scroll::-webkit-scrollbar { width: 6px; }
        .admin-scroll::-webkit-scrollbar-track { background: transparent; }
        .admin-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .link-button {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
        }
        .link-button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .category-card {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body x-data="portalApp()" class="min-h-screen relative transition-colors duration-300" :style="`background-color: ${settings.bgColor}; color: ${settings.textColor}`">

    <!-- Bouton Admin Flottant -->
    <button id="admin-floating-btn" @click="editMode = !editMode" 
            class="fixed bottom-6 right-6 z-50 bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:bg-slate-800 transition-transform hover:scale-110 flex items-center gap-2 group">
        <i class="fas fa-cog text-xl"></i>
        <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 ease-in-out whitespace-nowrap font-bold" x-text="editMode ? 'Fermer' : 'Éditer le portail'"></span>
    </button>

    <div class="flex h-screen w-full overflow-hidden">
        
        <!-- Panneau d'administration -->
        <div id="admin-panel" x-show="editMode" 
             x-transition:enter="transition ease-out duration-300 transform"
             x-transition:enter-start="-translate-x-full"
             x-transition:enter-end="translate-x-0"
             x-transition:leave="transition ease-in duration-200 transform"
             x-transition:leave-start="translate-x-0"
             x-transition:leave-end="-translate-x-full"
             class="w-full md:w-[500px] bg-white text-slate-800 shadow-2xl z-40 h-full flex flex-col absolute md:relative border-r border-slate-200">
            
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h2 class="text-xl font-bold text-slate-900">Éditeur de Portail</h2>
                <button @click="resetDefaults" class="text-xs text-red-600 font-semibold hover:bg-red-50 px-2 py-1 rounded">Réinitialiser</button>
            </div>

            <div class="p-6 overflow-y-auto admin-scroll flex-1 space-y-8">
                
                <!-- Layout & Grilles -->
                <section class="space-y-4">
                    <h3 class="font-bold text-slate-400 uppercase text-xs tracking-wider border-b pb-2">1. Mise en page</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-600">Colonnes (Catégories)</label>
                            <select x-model="settings.categoryColumns" @change="saveState" class="w-full text-sm p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="1">1 Colonne</option>
                                <option value="2">2 Colonnes</option>
                                <option value="3">3 Colonnes</option>
                                <option value="4">4 Colonnes</option>
                                <option value="5">5 Colonnes</option>
                                <option value="6">6 Colonnes</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-600">Colonnes (Outils)</label>
                            <select x-model="settings.linkColumns" @change="saveState" class="w-full text-sm p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="1">1 Colonne</option>
                                <option value="2">2 Colonnes</option>
                                <option value="3">3 Colonnes</option>
                                <option value="4">4 Colonnes</option>
                                <option value="5">5 Colonnes</option>
                                <option value="6">6 Colonnes</option>
                            </select>
                        </div>
                    </div>
                </section>

                <!-- Design -->
                <section class="space-y-4">
                    <h3 class="font-bold text-slate-400 uppercase text-xs tracking-wider border-b pb-2">2. Couleurs de Marque</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-600">Fond page</label>
                            <input type="color" x-model="settings.bgColor" @input="saveState" class="w-8 h-8 rounded cursor-pointer border-0 p-0">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-600">Texte page</label>
                            <input type="color" x-model="settings.textColor" @input="saveState" class="w-8 h-8 rounded cursor-pointer border-0 p-0">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-600">Fond boutons</label>
                            <input type="color" x-model="settings.buttonBgColor" @input="saveState" class="w-8 h-8 rounded cursor-pointer border-0 p-0">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-600">Texte boutons</label>
                            <input type="color" x-model="settings.buttonTextColor" @input="saveState" class="w-8 h-8 rounded cursor-pointer border-0 p-0">
                        </div>
                    </div>
                </section>

                <!-- Header -->
                <section class="space-y-4">
                    <h3 class="font-bold text-slate-400 uppercase text-xs tracking-wider border-b pb-2">3. En-tête</h3>
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-slate-600">URL du Logo</label>
                        <input type="text" x-model="settings.logoUrl" @input="saveState" class="w-full text-sm p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-slate-600">Titre</label>
                        <input type="text" x-model="settings.title" @input="saveState" class="w-full text-sm p-2 border rounded font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-slate-600">Description</label>
                        <textarea x-model="settings.description" @input="saveState" rows="2" class="w-full text-sm p-2 border rounded"></textarea>
                    </div>
                </section>

                <!-- Sections & Liens -->
                <section class="space-y-6">
                    <h3 class="font-bold text-slate-400 uppercase text-xs tracking-wider border-b pb-2">4. Contenu du Portail (Boîtes & Liens)</h3>
                    
                    <div class="space-y-6">
                        <template x-for="(cat, catIndex) in categories" :key="cat.id">
                            <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                                
                                <!-- Header Section (Catégorie) -->
                                <div class="mb-4 space-y-2">
                                    <div class="flex justify-between items-center">
                                        <label class="block text-[10px] font-bold text-slate-500 uppercase">Boîte Catégorie</label>
                                        <div class="flex gap-1">
                                            <button @click="moveCategoryUp(catIndex)" x-show="catIndex > 0" class="text-slate-400 hover:text-blue-500" title="Monter"><i class="fas fa-arrow-up"></i></button>
                                            <button @click="moveCategoryDown(catIndex)" x-show="catIndex < categories.length - 1" class="text-slate-400 hover:text-blue-500" title="Descendre"><i class="fas fa-arrow-down"></i></button>
                                            <button @click="removeCategory(catIndex)" class="text-slate-400 hover:text-red-500 ml-2" title="Supprimer"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-12 gap-2">
                                        <div class="col-span-5">
                                            <select x-model="cat.icon" @change="saveState" class="w-full text-xs p-1.5 border rounded outline-none focus:border-blue-500">
                                                <option value="fas fa-folder">Dossier</option>
                                                <option value="fas fa-chart-pie">Camembert</option>
                                                <option value="fas fa-search">Recherche</option>
                                                <option value="fas fa-rocket">Fusée</option>
                                                <option value="fas fa-cogs">Paramètres</option>
                                                <option value="fas fa-graduation-cap">Diplôme</option>
                                                <option value="fas fa-tools">Outils</option>
                                            </select>
                                        </div>
                                        <div class="col-span-2">
                                            <input type="color" x-model="cat.iconColor" @input="saveState" class="w-full h-7 rounded cursor-pointer border-0 p-0">
                                        </div>
                                        <div class="col-span-5">
                                            <input type="text" x-model="cat.title" @input="saveState" placeholder="Titre..." class="w-full text-xs p-1.5 border rounded outline-none focus:border-blue-500 font-bold">
                                        </div>
                                    </div>
                                </div>

                                <!-- Liens de la section -->
                                <div class="space-y-3 pl-4 border-l-2 border-slate-300">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Outils à l'intérieur de la boîte</label>
                                    
                                    <template x-for="(link, linkIndex) in cat.links" :key="link.id">
                                        <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200 relative group">
                                            <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white">
                                                <button @click="moveLinkUp(catIndex, linkIndex)" x-show="linkIndex > 0" class="text-slate-400 hover:text-blue-500 text-xs p-1"><i class="fas fa-arrow-up"></i></button>
                                                <button @click="moveLinkDown(catIndex, linkIndex)" x-show="linkIndex < cat.links.length - 1" class="text-slate-400 hover:text-blue-500 text-xs p-1"><i class="fas fa-arrow-down"></i></button>
                                                <button @click="removeLink(catIndex, linkIndex)" class="text-slate-400 hover:text-red-500 text-xs p-1"><i class="fas fa-times"></i></button>
                                            </div>
                                            
                                            <div class="grid grid-cols-12 gap-2 mb-2">
                                                <div class="col-span-5">
                                                    <label class="block text-[10px] text-slate-500">Icône</label>
                                                    <select x-model="link.icon" @change="saveState" class="w-full text-xs p-1.5 border rounded outline-none">
                                                        <option value="fas fa-link">Lien</option>
                                                        <option value="fas fa-chart-bar">Graphique</option>
                                                        <option value="fas fa-chart-line">Courbe</option>
                                                        <option value="fas fa-calculator">Calculatrice</option>
                                                        <option value="fas fa-bullseye">Cible</option>
                                                        <option value="fas fa-graduation-cap">Diplôme</option>
                                                        <option value="fas fa-file-pdf">PDF</option>
                                                    </select>
                                                </div>
                                                <div class="col-span-2">
                                                    <label class="block text-[10px] text-slate-500">Couleur</label>
                                                    <input type="color" x-model="link.iconColor" @input="saveState" class="w-full h-7 rounded cursor-pointer border-0 p-0">
                                                </div>
                                                <div class="col-span-5">
                                                    <label class="block text-[10px] text-slate-500">Titre</label>
                                                    <input type="text" x-model="link.title" @input="saveState" class="w-full text-xs p-1.5 border rounded font-semibold">
                                                </div>
                                            </div>
                                            <div class="mb-2">
                                                <label class="block text-[10px] text-slate-500">URL</label>
                                                <input type="text" x-model="link.url" @input="saveState" class="w-full text-xs p-1.5 border rounded text-blue-600">
                                            </div>
                                        </div>
                                    </template>
                                    
                                    <button @click="addLink(catIndex)" class="w-full py-2 border-2 border-dashed border-slate-300 text-slate-500 rounded-lg hover:bg-white hover:text-blue-600 text-xs font-semibold">
                                        + Ajouter un outil à cette boîte
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>

                    <button @click="addCategory" class="w-full py-3 bg-slate-800 text-white rounded-lg hover:bg-slate-700 font-semibold shadow flex items-center justify-center gap-2">
                        <i class="fas fa-folder-plus"></i> Nouvelle Boîte (Catégorie)
                    </button>
                </section>

                <!-- Exportation -->
                <section class="space-y-4">
                    <h3 class="font-bold text-slate-400 uppercase text-xs tracking-wider border-b pb-2 text-blue-600">5. Exporter ce Portail</h3>
                    <p class="text-xs text-slate-500">Générez un fichier HTML complet contenant cette configuration, prêt à être déployé (ex: <code>marketing.html</code>).</p>
                    
                    <label class="flex items-start gap-2 p-3 border border-blue-100 bg-blue-50/50 rounded cursor-pointer hover:bg-blue-50 transition-colors">
                        <input type="checkbox" x-model="exportFrozen" class="mt-1 rounded text-blue-600 focus:ring-blue-500">
                        <div>
                            <span class="block text-sm font-bold text-blue-900">Figer le portail (Mode Client)</span>
                            <span class="block text-[10px] text-blue-700 mt-0.5 leading-tight">Cochez ceci pour supprimer totalement le bouton d'édition et le panneau d'administration du fichier exporté. Idéal pour livrer au client final.</span>
                        </div>
                    </label>

                    <div>
                        <label class="block text-xs font-semibold mb-1 text-slate-600">Nom du fichier</label>
                        <div class="flex">
                            <input type="text" x-model="exportFilename" placeholder="marketing" class="w-full text-sm p-2 border rounded-l focus:ring-2 focus:ring-blue-500 outline-none">
                            <span class="bg-slate-100 border border-l-0 border-slate-200 p-2 rounded-r text-sm text-slate-500">.html</span>
                        </div>
                    </div>
                    <button @click="exportHtml" class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-lg flex items-center justify-center gap-2 transition-colors">
                        <i class="fas fa-download"></i> Télécharger le fichier .html
                    </button>
                </section>

                <div class="pb-12"></div>
            </div>
        </div>

        <!-- Preview (Côté public) -->
        <div class="flex-1 h-full overflow-y-auto relative w-full px-4 md:px-8">
            <div class="max-w-[1200px] mx-auto py-12 md:py-16 flex flex-col min-h-full">
                
                <!-- En-tête -->
                <div class="text-center mb-12 w-full max-w-3xl mx-auto">
                    <div class="w-28 h-28 mx-auto mb-6 rounded-2xl overflow-hidden shadow-xl bg-white p-2" :style="`border: 2px solid ${settings.buttonBgColor}`">
                        <img :src="settings.logoUrl || 'https://via.placeholder.com/150'" alt="Logo" class="w-full h-full object-contain rounded-xl">
                    </div>
                    <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight mb-4" x-text="settings.title"></h1>
                    <p class="text-lg md:text-xl font-medium opacity-90 leading-relaxed" x-html="settings.description.replace(/\n/g, '<br>')"></p>
                </div>

                <!-- Grille des Catégories -->
                <div class="w-full grid gap-6" :class="gridClass(settings.categoryColumns)">
                    <template x-for="(cat, index) in categories" :key="cat.id">
                        
                        <!-- Boîte Catégorie (Card) -->
                        <div class="flex flex-col h-full category-card rounded-3xl overflow-hidden shadow-lg border border-white/10"
                             :style="`background-color: ${settings.buttonBgColor}; color: ${settings.buttonTextColor}`">
                            
                            <!-- Header de la boîte (cliquable pour ouvrir/fermer) -->
                            <button @click="cat.open = !cat.open" class="w-full p-6 flex flex-col items-center text-center cursor-pointer group hover:bg-black/5 transition-colors relative">
                                
                                <div class="w-16 h-16 rounded-full flex items-center justify-center text-3xl mb-4 shadow-sm group-hover:scale-110 transition-transform" :style="`color: ${cat.iconColor || '#ed2c1a'}; background-color: ${cat.iconColor || '#ed2c1a'}15;`">
                                    <i :class="cat.icon || 'fas fa-folder'"></i>
                                </div>
                                
                                <h2 class="text-2xl font-extrabold tracking-tight" x-text="cat.title"></h2>
                                
                                <!-- Indicateur d'ouverture (Chevron) -->
                                <div class="absolute top-6 right-6 opacity-40 group-hover:opacity-100 transition-opacity">
                                    <i class="fas fa-chevron-down transition-transform duration-300" :class="cat.open ? 'rotate-180' : ''"></i>
                                </div>
                            </button>
                            
                            <!-- Contenu de la boîte (Outils) - Révélé avec Accordion x-collapse -->
                            <div x-show="cat.open" x-collapse>
                                <div class="p-6 pt-0 border-t border-black/5 bg-black/5">
                                    <div class="mt-6 grid gap-4" :class="gridClass(settings.linkColumns)">
                                        <template x-for="link in cat.links" :key="link.id">
                                            
                                            <!-- Carte Outil -->
                                            <a :href="link.url" target="_blank" rel="noopener noreferrer" 
                                               class="link-button group flex items-center p-4 rounded-2xl bg-white shadow-sm border border-slate-100 relative overflow-hidden h-full">
                                                
                                                <!-- Icone FontAwesome -->
                                                <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg shrink-0 mr-4" :style="`color: ${link.iconColor || '#ed2c1a'}; background-color: ${link.iconColor || '#ed2c1a'}15;`">
                                                    <i :class="link.icon || 'fas fa-link'"></i>
                                                </div>
                                                
                                                <!-- Text content -->
                                                <div class="flex-1 pr-6">
                                                    <h3 class="font-bold text-sm md:text-base leading-tight text-slate-800" x-text="link.title"></h3>
                                                </div>

                                                <!-- Fleche -->
                                                <div class="absolute right-4 opacity-0 group-hover:opacity-100 transition-all transform group-hover:translate-x-1">
                                                    <i class="fas fa-arrow-right text-slate-400"></i>
                                                </div>
                                            </a>

                                        </template>
                                        
                                        <!-- Message vide -->
                                        <div x-show="cat.links.length === 0" class="text-center p-4 text-sm opacity-50 italic col-span-full">
                                            Aucun outil dans cette boîte.
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </template>
                </div>

                <!-- Footer -->
                <div class="mt-20 text-center opacity-60 pb-10">
                    <div class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold">
                        &copy; 2026 My Sport Business
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const defaultState = {
            settings: {
                bgColor: '#140c4f',
                textColor: '#ffffff',
                buttonBgColor: '#ffffff',
                buttonTextColor: '#140c4f',
                logoUrl: 'images/logoMSBLarge.jpeg',
                title: 'My Sport Business',
                description: 'Portail de démonstration stratégique.',
                categoryColumns: '3', 
                linkColumns: '1'
            },
            categories: [
                {
                    id: 1,
                    title: 'Pilotage & Outils',
                    icon: 'fas fa-cogs',
                    iconColor: '#ed2c1a',
                    open: true, // Ouvert par défaut pour la démo
                    links: [
                        { id: 101, icon: 'fas fa-calculator', iconColor: '#ed2c1a', title: 'Simulateur de Capacité & CA', url: 'simulateur_capacite.html' }
                    ]
                },
                {
                    id: 2,
                    title: 'Marché & Stratégie',
                    icon: 'fas fa-chart-pie',
                    iconColor: '#5b7065',
                    open: true,
                    links: [
                        { id: 201, icon: 'fas fa-chart-line', iconColor: '#5b7065', title: 'Étude de Concurrence 2026', url: 'landing_etude_concurrence.html' },
                        { id: 202, icon: 'fas fa-bullseye', iconColor: '#140c4f', title: 'Présentation Stratégique', url: 'soutenance_presentation.html' }
                    ]
                },
                {
                    id: 3,
                    title: 'Ressources',
                    icon: 'fas fa-folder',
                    iconColor: '#140c4f',
                    open: false,
                    links: [
                        { id: 301, icon: 'fas fa-graduation-cap', iconColor: '#ed2c1a', title: 'Portail Soutenance (Clean)', url: 'portail_soutenance.html' }
                    ]
                }
            ]
        };

        document.addEventListener('alpine:init', () => {
            Alpine.data('portalApp', () => ({
                editMode: false,
                exportFilename: 'nouveau_portail',
                exportFrozen: false,
                settings: JSON.parse(JSON.stringify(defaultState.settings)),
                categories: JSON.parse(JSON.stringify(defaultState.categories)),

                init() {
                    this.loadState();
                    if(this.categories.length === 0) this.editMode = true;
                },

                // Utilitaire pour générer la classe grid-cols-X dynamiquement
                // Tailwind a besoin que les classes complètes existent dans le code source pour ne pas les purger
                gridClass(cols) {
                    const map = {
                        '1': 'grid-cols-1',
                        '2': 'grid-cols-1 md:grid-cols-2',
                        '3': 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3',
                        '4': 'grid-cols-1 md:grid-cols-2 lg:grid-cols-4',
                        '5': 'grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5',
                        '6': 'grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6'
                    };
                    return map[String(cols)] || 'grid-cols-1';
                },

                // Gestion des Catégories
                addCategory() {
                    this.categories.push({
                        id: Date.now(),
                        title: 'Nouvelle Boîte',
                        icon: 'fas fa-folder',
                        iconColor: '#140c4f',
                        open: true,
                        links: []
                    });
                    this.saveState();
                },
                removeCategory(catIndex) {
                    if(confirm("Supprimer cette boîte et tous ses outils ?")) {
                        this.categories.splice(catIndex, 1);
                        this.saveState();
                    }
                },
                moveCategoryUp(index) {
                    if (index > 0) {
                        [this.categories[index - 1], this.categories[index]] = [this.categories[index], this.categories[index - 1]];
                        this.saveState();
                    }
                },
                moveCategoryDown(index) {
                    if (index < this.categories.length - 1) {
                        [this.categories[index + 1], this.categories[index]] = [this.categories[index], this.categories[index + 1]];
                        this.saveState();
                    }
                },

                // Gestion des Liens
                addLink(catIndex) {
                    this.categories[catIndex].links.push({
                        id: Date.now(),
                        icon: 'fas fa-link',
                        iconColor: '#ed2c1a',
                        title: 'Nouvel Outil',
                        url: 'https://'
                    });
                    this.saveState();
                },
                removeLink(catIndex, linkIndex) {
                    if(confirm("Supprimer cet outil ?")) {
                        this.categories[catIndex].links.splice(linkIndex, 1);
                        this.saveState();
                    }
                },
                moveLinkUp(catIndex, linkIndex) {
                    if (linkIndex > 0) {
                        const links = this.categories[catIndex].links;
                        [links[linkIndex - 1], links[linkIndex]] = [links[linkIndex], links[linkIndex - 1]];
                        this.saveState();
                    }
                },
                moveLinkDown(catIndex, linkIndex) {
                    const links = this.categories[catIndex].links;
                    if (linkIndex < links.length - 1) {
                        [links[linkIndex + 1], links[linkIndex]] = [links[linkIndex], links[linkIndex + 1]];
                        this.saveState();
                    }
                },

                // Sauvegarde
                saveState() {
                    try {
                        localStorage.setItem('mssLinktreeStateV4', JSON.stringify({
                            settings: this.settings,
                            categories: this.categories.map(c => ({...c, open: false})) // Ne pas save l'état ouvert/fermé
                        }));
                    } catch (e) {}
                },
                loadState() {
                    try {
                        const saved = localStorage.getItem('mssLinktreeStateV4');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            this.settings = { ...this.settings, ...parsed.settings };
                            
                            // Fusionner les catégories sans écraser 'open' (on met open=false par défaut ou true si on veut)
                            if(parsed.categories) {
                                this.categories = parsed.categories.map(c => ({...c, open: false}));
                            }
                        }
                    } catch (e) {}
                },
                resetDefaults() {
                    if(confirm("Réinitialiser avec le contenu par défaut My Sport Business ?")) {
                        localStorage.removeItem('mssLinktreeStateV4');
                        this.settings = JSON.parse(JSON.stringify(defaultState.settings));
                        this.categories = JSON.parse(JSON.stringify(defaultState.categories));
                    }
                },
                
                exportHtml() {
                    fetch(window.location.href)
                        .then(response => response.text())
                        .then(html => {
                            const newState = {
                                settings: this.settings,
                                categories: this.categories.map(c => ({...c, open: false}))
                            };
                            const stateString = JSON.stringify(newState, null, 12);
                            
                            // Remplacement du defaultState dans le code source original
                            let modifiedHtml = html.replace(
                                /const defaultState = [\s\S]*?;\s*document\.addEventListener/m,
                                `const defaultState = ${stateString};\n\n        document.addEventListener`
                            );
                            
                            // Si l'utilisateur a choisi de figer le portail, on supprime carrément l'admin du DOM !
                            if (this.exportFrozen) {
                                const parser = new DOMParser();
                                const doc = parser.parseFromString(modifiedHtml, 'text/html');
                                const btn = doc.getElementById('admin-floating-btn');
                                if (btn) btn.remove();
                                const panel = doc.getElementById('admin-panel');
                                if (panel) panel.remove();
                                modifiedHtml = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                            }
                            
                            const blob = new Blob([modifiedHtml], { type: 'text/html' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            let filename = this.exportFilename.trim();
                            if (!filename) filename = 'nouveau_portail';
                            if (!filename.endsWith('.html')) filename += '.html';
                            a.download = filename;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        })
                        .catch(err => {
                            console.error("Export error:", err);
                            alert("Erreur lors de l'exportation. Assurez-vous d'être connecté à internet.");
                        });
                }
            }));
        });
    </script>
</body>
</html>
